<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; background: #F6F4EF; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Helvetica, Arial, sans-serif;
  color: #1B1D22;

}
#app { max-width: 480px; margin: 0 auto; min-height: 100vh; background: #F6F4EF; }

button { font-family: inherit; border: none; background: none; cursor: pointer; -webkit-appearance: none; }

.navbar {

.back-btn { color: #2F6F6B; font-size: 15px; padding: 4px 0; font-weight: 500; }

.intro { padding: 0 20px; font-size: 13px; color: #6B6B70; margin: 8px 0 12px; }

.topic-list { padding: 0 16px; display: flex; flex-direction: column; gap: 10px; }

<script>
/* Interview Prep - offline-first vanilla JS app */

const TOPICS = [

      "Tell me about a time you found an unexpected insight in the data.",

  {
    id: "sales",
    title: "Analiza sprzedaży",
    subtitle: "Przychód, marże, prognozy",
    accent: "#C97B2E",
    icon: "📈",
    flashcards: [
      { en: "revenue", pl: "przychód", example: "Revenue grew by 12% last quarter." },
      { en: "margin", pl: "marża", example: "We improved our margin by cutting supplier costs." },
      { en: "churn rate", pl: "wskaźnik odejść klientów", example: "Churn rate dropped after we improved support." },
      { en: "conversion rate", pl: "współczynnik konwersji", example: "The new landing page raised our conversion rate." },
      { en: "upsell", pl: "dosprzedaż", example: "We trained the team to upsell premium packages." },
      { en: "pipeline", pl: "lejek sprzedażowy", example: "Our pipeline is full going into Q3." },
      { en: "quota", pl: "cel sprzedażowy", example: "She exceeded her quota two months in a row." },
      { en: "year-over-year (YoY)", pl: "rok do roku", example: "Sales are up 8% year-over-year." },
      { en: "customer acquisition cost", pl: "koszt akwizycji klienta", example: "We lowered customer acquisition cost with referrals." },
      { en: "benchmark", pl: "punkt odniesienia", example: "We use last year's numbers as a benchmark." }
    ],
    questions: [
      "How do you measure whether a sales strategy is working?",
      "Tell me about a time your analysis changed a sales decision.",
      "How do you forecast next quarter's revenue?",
      "What metrics do you track to evaluate customer churn?",
      "How would you identify our most profitable product line?",
      "How do you present sales results to people who aren't analysts?"
    ]
  },
  {
    id: "business",
    title: "Rozmowy branżowe",
    subtitle: "Z przełożonymi, o projektach",
    accent: "#5B6B8C",
    icon: "👥",
    flashcards: [
      { en: "stakeholder", pl: "interesariusz", example: "We need sign-off from all stakeholders." },
      { en: "align on", pl: "uzgodnić wspólne podejście", example: "Let's align on the timeline before we start." },
      { en: "deliverable", pl: "produkt pracy", example: "The first deliverable is due next Friday." },
      { en: "bandwidth", pl: "dostępność/czas", example: "I don't have the bandwidth for this right now." },
      { en: "touch base", pl: "skontaktować się", example: "Let's touch base on Monday morning." },
      { en: "escalate", pl: "eskalować", example: "If it's not resolved today, I'll escalate it." },
      { en: "on the same page", pl: "zgodni co do podejścia", example: "I want to make sure we're on the same page." },
      { en: "circle back", pl: "wrócić do tematu", example: "Can we circle back to this after lunch?" },
      { en: "low-hanging fruit", pl: "łatwe zadania", example: "Let's start with the low-hanging fruit." },
      { en: "take ownership of", pl: "wziąć odpowiedzialność za", example: "She took ownership of the whole migration." }
    ],
    questions: [
      "Could you give me a quick update on where this project stands?",
      "What's blocking you from hitting this deadline?",
      "How would you push back if you disagreed with your manager's decision?",
      "Can you summarize the main risks of this plan?",

  {

    title: "Rozmowy o sobie",
    subtitle: "Luźne pytania, small talk",
    accent: "#A8554A",
    icon: "☕",
    flashcards: [
      { en: "background", pl: "doświadczenie zawodowe", example: "My background is in sales analytics." },
      { en: "strength / weakness", pl: "mocna/słaba strona", example: "One of my strengths is attention to detail." },
      { en: "work-life balance", pl: "balans praca-życie", example: "I value a good work-life balance." },
      { en: "hobby", pl: "hobby", example: "My hobby is hiking in the mountains." },
      { en: "career path", pl: "ścieżka kariery", example: "I'd like to move into a data science career path." },
      { en: "challenge", pl: "wyzwanie", example: "The biggest challenge was learning SQL on the job." },
      { en: "team player", pl: "osoba dobrze pracująca w zespole", example: "I see myself as a strong team player." },
      { en: "self-taught", pl: "samouk", example: "I'm largely self-taught in Python." },
      { en: "comfort zone", pl: "strefa komfortu", example: "I like stepping outside my comfort zone." },
      { en: "growth mindset", pl: "nastawienie na rozwój", example: "I try to keep a growth mindset at work." }
    ],
    questions: [
      "Tell me a bit about yourself.",
      "What do you do outside of work?",
      "What are you most proud of in your career so far?",
      "What's something you're currently working on improving?",
      "Why are you looking for a new role now?",
      "Where do you see yourself in five years?"
    ]
  }
];

/* ---------- state ---------- */

const state = {
  screen: "home",       // 'home' | 'topic'
  topicId: null,
  tab: "vocab",          // 'vocab' | 'questions' | 'practice'
  cardIndex: 0,
  flipped: false,
  practiceQIdx: 0,
  practiceFreeQuestion: null, // when set, overrides practiceQIdx selection from "questions" tab
  answer: "",
  feedback: null,
  loading: false,
  error: null,
  settingsOpen: false,
  progress: {}, // topicId -> { known: Set, practiced: Set }
  settings: { mode: "offline", apiKey: "" }
};

TOPICS.forEach(t => { state.progress[t.id] = { known: new Set(), practiced: new Set() }; });

/* load persisted settings (this is a local file the user saved themselves, so
   localStorage works normally here and just keeps the API key on this device) */
try {
  const saved = JSON.parse(localStorage.getItem("ip_settings") || "null");
  if (saved && typeof saved === "object") {
    state.settings.mode = saved.mode === "online" ? "online" : "offline";
    state.settings.apiKey = typeof saved.apiKey === "string" ? saved.apiKey : "";
  }
} catch (e) { /* ignore corrupt storage */ }

function saveSettings() {
  try { localStorage.setItem("ip_settings", JSON.stringify(state.settings)); } catch (e) {}
}

function getTopic(id) { return TOPICS.find(t => t.id === id); }

/* ---------- speech output ---------- */

function pickEnglishVoice() {
  const voices = window.speechSynthesis.getVoices();
  return voices.find(v => v.lang === "en-US") || voices.find(v => v.lang && v.lang.startsWith("en")) || null;
}

let voicesReady = null;
function ensureVoicesLoaded() {
  if (voicesReady) return voicesReady;
  voicesReady = new Promise(resolve => {
    if (!("speechSynthesis" in window)) return resolve(false);
    if (window.speechSynthesis.getVoices().length > 0) return resolve(true);
    let done = false;
    window.speechSynthesis.onvoiceschanged = () => { if (!done) { done = true; resolve(true); } };
    setTimeout(() => { if (!done) { done = true; resolve(window.speechSynthesis.getVoices().length > 0); } }, 600);
  });
  return voicesReady;
}

async function speak(text) {
  if (!("speechSynthesis" in window)) return false;
  await ensureVoicesLoaded();
  return new Promise(resolve => {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "en-US";
    u.rate = 0.92;
    const v = pickEnglishVoice();
    if (v) u.voice = v;
    u.onend = () => resolve(true);
    u.onerror = () => resolve(false);
    window.speechSynthesis.resume();
    window.speechSynthesis.speak(u);
  });
}

async function speakWordThenExample(word, example) {
  window.speechSynthesis.cancel();
  await speak(word);
  await new Promise(r => setTimeout(r, 350));
  if (example) await speak(example);
}

/* ---------- dictation (voice input) ---------- */

function getRecognitionCtor() {
  return window.SpeechRecognition || window.webkitSpeechRecognition || null;
}
let activeRecognition = null;

function startDictation(onResult, onEnd) {
  const Ctor = getRecognitionCtor();
  if (!Ctor) return false;
  const rec = new Ctor();
  rec.lang = "en-US";
  rec.continuous = true;
  rec.interimResults = false;
  rec.onresult = e => {
    let text = "";
    for (let i = e.resultIndex; i < e.results.length; i++) text += e.results[i][0].transcript;
    onResult(text.trim());
  };
  rec.onerror = () => onEnd();
  rec.onend = () => onEnd();
  activeRecognition = rec;
  rec.start();
  return true;
}
function stopDictation() {
  if (activeRecognition) activeRecognition.stop();
  activeRecognition = null;
}

/* ---------- AI coach (online mode only) ---------- */

async function getCoachFeedback(question, answer, apiKey) {
  const system = "Jesteś trenerem języka angielskiego biznesowego dla polskiej analityczki sprzedaży i danych, która przygotowuje się do rozmowy o pracę i rozmów z obcojęzycznymi przełożonymi. Dostajesz pytanie (po angielsku) i odpowiedź użytkowniczki (po angielsku). Odpowiadaj PO POLSKU, krótko i konkretnie, w trzech sekcjach oddzielonych pustą linią, bez nagłówków markdown:\n1. Jedno zdanie ogólnej oceny.\n2. Maks. 3 konkretne poprawki gramatyczne lub leksykalne w formacie: błąd -> poprawka (krótkie wyjaśnienie po polsku). Jeśli nie ma błędów, napisz \"Brak istotnych błędów językowych.\"\n3. Bardziej naturalna / profesjonalna wersja całej odpowiedzi, po angielsku, w 2-4 zdaniach.\nNie używaj gwiazdek ani innego formatowania markdown.";

  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true"
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 1000,
      system,
      messages: [{ role: "user", content: `Pytanie: "${question}"\n\nOdpowiedź: "${answer}"` }]
    })
  });
  if (!res.ok) {
    const errBody = await res.text().catch(() => "");
    throw new Error(`API error ${res.status}: ${errBody.slice(0, 200)}`);
  }
  const data = await res.json();
  const text = (data.content || []).filter(b => b.type === "text").map(b => b.text).join("\n");
  return text || "Brak odpowiedzi od modelu.";
}

/* ---------- rendering helpers ---------- */

function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

function ring(pct, color, size) {
  size = size || 44;
  const stroke = 5;
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const offset = c - (pct / 100) * c;
  return `<svg width="${size}" height="${size}" style="transform:rotate(-90deg)">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" stroke="#E7E3DA" stroke-width="${stroke}" fill="none"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" stroke="${color}" stroke-width="${stroke}" fill="none"
      stroke-dasharray="${c}" stroke-dashoffset="${offset}" stroke-linecap="round" style="transition:stroke-dashoffset .4s"/>
  </svg>`;
}

/* ---------- screens ---------- */

function renderHome() {
  const cards = TOPICS.map(t => {
    const total = t.flashcards.length + t.questions.length;
    const prog = state.progress[t.id];
    const done = prog.known.size + prog.practiced.size;
    const pct = Math.round((done / total) * 100);
    return `
      <button class="topic-card" data-action="open-topic" data-id="${t.id}">
        <div class="topic-icon" style="background:${t.accent}1A">${t.icon}</div>
        <div class="topic-text">
          <div class="topic-title">${esc(t.title)}</div>
          <div class="topic-subtitle">${esc(t.subtitle)}</div>
        </div>
        <div class="topic-ring">
          ${ring(pct, t.accent)}
          <span class="ring-label" style="color:${t.accent}">${pct}%</span>
        </div>
        <div class="chevron">›</div>
      </button>`;
  }).join("");

  return `
    <div class="navbar">
      <div class="navbar-row">
        <div style="width:1px"></div>
        <button class="gear-btn" data-action="open-settings" aria-label="Ustawienia">⚙️</button>
      </div>
      <h1 class="navbar-title">Przygotuj się do rozmowy</h1>
    </div>
    <p class="intro">Słownictwo, pytania i rozmowa z trenerem AI — w 4 obszarach.</p>
    <div class="topic-list">${cards}</div>
  `;
}

function renderSegmented(options, value) {
  return `<div class="segmented">${options.map(o => `
    <button class="seg-btn ${o.id === value ? 'active' : ''}" data-action="${o.action}" data-value="${o.id}">${esc(o.label)}</button>
  `).join("")}</div>`;
}

function renderVocabTab(topic, prog) {
  const card = topic.flashcards[state.cardIndex];
  const known = prog.known.has(state.cardIndex);
  return `
    <div class="pad">
      <div class="counter">${state.cardIndex + 1} / ${topic.flashcards.length}</div>
      <div class="flashcard" data-action="flip-card">
        ${!state.flipped ? `
          <div class="card-en">${esc(card.en)}</div>
          <div class="card-hint">Stuknij, by zobaczyć tłumaczenie</div>
        ` : `
          <div class="card-pl" style="color:${topic.accent}">${esc(card.pl)}</div>
          <div class="card-example">"${esc(card.example)}"</div>
        `}
      </div>
      <div class="card-controls">
        <button class="icon-btn" data-action="prev-card">‹</button>
        <button class="icon-btn" data-action="speak-card" aria-label="Odsłuchaj słowo i przykład">🔊</button>
        <button class="know-btn" data-action="toggle-known" style="background:${known ? topic.accent : '#fff'};color:${known ? '#fff' : topic.accent};border-color:${topic.accent}">
          ${known ? '✓ Znam' : 'Oznacz jako znane'}
        </button>
        <button class="icon-btn" data-action="next-card">›</button>
      </div>
    </div>
  `;
}

function renderQuestionsTab(topic, prog) {
  const items = topic.questions.map((q, idx) => {
    const done = prog.practiced.has(idx);
    return `
      <div class="question-card">
        <div class="question-text">${esc(q)}</div>
        <div class="question-actions">
          <button class="link-btn" data-action="speak-question" data-idx="${idx}">🔊 Odsłuchaj</button>
          <button class="link-btn" style="color:${topic.accent}" data-action="practice-question" data-idx="${idx}">✨ Odpowiedz z AI</button>
        </div>
        ${done ? `<div class="done-badge" style="background:${topic.accent}">✓</div>` : ""}
      </div>`;
  }).join("");
  return `<div class="pad">${items}</div>`;
}

function renderPracticeTab(topic, prog) {
  const isFree = state.practiceFreeQuestion !== null;
  const question = isFree ? topic.questions[state.practiceFreeQuestion] : topic.questions[state.practiceQIdx];
  const qIdxForProgress = isFree ? state.practiceFreeQuestion : state.practiceQIdx;

  const segHtml = !isFree ? renderSegmented(
    topic.questions.map((q, i) => ({ id: i, label: String(i + 1), action: "select-practice-q" })),
    state.practiceQIdx
  ) : "";

  const online = state.settings.mode === "online" && state.settings.apiKey;

  let bottomHtml = "";
  if (!online) {
    bottomHtml = `
      <div class="offline-notice">
        Tryb AI jest wyłączony. Aby otrzymać feedback od trenera, włącz tryb online i dodaj swój klucz API Anthropic w ustawieniach.
        <button class="link-btn" style="margin-top:6px" data-action="open-settings">Otwórz ustawienia ⚙️</button>
      </div>`;
  } else {
    bottomHtml = `
      <div class="answer-wrap">
        <textarea id="answer-box" class="answer-box" placeholder="Napisz odpowiedź dotykiem lub nagraj ją głosem…">${esc(state.answer)}</textarea>
        <button class="mic-btn ${state.dictating ? 'listening' : ''}" data-action="toggle-mic" aria-label="Nagraj odpowiedź głosem">
          ${state.dictating ? '⏹' : '🎙️'}
        </button>
      </div>
      ${state.dictationHint ? `<div class="hint-text">Ta przeglądarka nie wspiera nagrywania głosem w aplikacji. Na iPhonie możesz mówić swoją odpowiedź, stukając ikonę mikrofonu na klawiaturze ekranowej, gdy kursor jest w polu tekstowym.</div>` : ""}
      <div class="submit-row">
        <button class="submit-btn" style="background:${topic.accent}" data-action="submit-answer" ${state.loading || !state.answer.trim() ? "disabled" : ""}>
          ${state.loading ? "Sprawdzam…" : "Wyślij do trenera AI ✈️"}
        </button>
        ${(state.feedback || state.error) ? `<button class="reset-btn" data-action="reset-practice">↺</button>` : ""}
      </div>
      ${state.error ? `<div class="error-text">${esc(state.error)}</div>` : ""}
      ${state.feedback ? `<div class="feedback-box"><div class="feedback-label" style="color:${topic.accent}">✨ Feedback trenera</div><div class="feedback-text">${esc(state.feedback)}</div></div>` : ""}
    `;
  }

  return `
    <div class="pad">
      ${segHtml}
      <div class="question-card" style="margin-top:${isFree ? '0' : '8px'}">
        <div class="question-text" style="flex:1">${esc(question)}</div>
        <button class="icon-btn small" data-action="speak-practice-question">🔊</button>
      </div>
      ${bottomHtml}
    </div>
  `;
}

function renderTopicScreen() {
  const topic = getTopic(state.topicId);
  const prog = state.progress[topic.id];
  let body = "";
  if (state.tab === "vocab") body = renderVocabTab(topic, prog);
  else if (state.tab === "questions") body = renderQuestionsTab(topic, prog);
  else body = renderPracticeTab(topic, prog);

  return `
    <div class="navbar">
      <div class="navbar-row">
        <button class="back-btn" data-action="go-home">‹ Start</button>
      </div>
      <h1 class="navbar-title">${esc(topic.title)}</h1>
    </div>
    ${renderSegmented([
      { id: "vocab", label: "Słownictwo", action: "select-tab" },
      { id: "questions", label: "Pytania", action: "select-tab" },
      { id: "practice", label: "Rozmowa AI", action: "select-tab" }
    ], state.tab)}
    ${body}
  `;
}

function renderSettings() {
  if (!state.settingsOpen) return "";
  const m = state.settings.mode;
  return `
    <div class="modal-backdrop" data-action="close-settings">
      <div class="modal" data-stop="1">
        <div class="modal-title">Ustawienia</div>
        <div class="settings-row">
          <button class="mode-btn ${m === 'offline' ? 'active' : ''}" data-action="set-mode" data-mode="offline">Offline</button>
          <button class="mode-btn ${m === 'online' ? 'active' : ''}" data-action="set-mode" data-mode="online">Online (AI)</button>
        </div>
        ${m === 'online' ? `
          <label class="settings-label">Twój klucz API Anthropic</label>
          <input id="api-key-input" class="settings-input" type="password" placeholder="sk-ant-..." value="${esc(state.settings.apiKey)}" />
          <div class="settings-note">
            Klucz jest zapisywany tylko na tym urządzeniu (w pamięci przeglądarki) i wysyłany bezpośrednio z Twojego telefonu do api.anthropic.com — nigdzie indziej. Klucz wygenerujesz na console.anthropic.com (płatność według zużycia).
          </div>
        ` : `
          <div class="settings-note">
            W trybie offline słownictwo, pytania i wymowa na głos działają bez internetu. Funkcja AI-coacha jest wyłączona.
          </div>
        `}
        <button class="save-btn" data-action="save-settings">Zapisz</button>
      </div>
    </div>
  `;
}

function render() {
  const app = document.getElementById("app");
  app.innerHTML = (state.screen === "home" ? renderHome() : renderTopicScreen()) + renderSettings();
  attachEvents();
  const box = document.getElementById("answer-box");
  if (box) {
    box.addEventListener("input", e => { state.answer = e.target.value; });
    // keep focus/cursor reasonable; no re-render needed on every keystroke
  }
  const keyInput = document.getElementById("api-key-input");
  if (keyInput) {
    keyInput.addEventListener("input", e => { state.settings.apiKey = e.target.value; });
  }
}

/* ---------- event handling ---------- */

function attachEvents() {
  document.getElementById("app").onclick = handleClick;
}

function handleClick(e) {
  const backdrop = e.target.closest('[data-action="close-settings"]');
  if (backdrop && !e.target.closest('[data-stop]')) {
    state.settingsOpen = false;
    render();
    return;
  }
  const el = e.target.closest("[data-action]");
  if (!el) return;
  const action = el.dataset.action;

  switch (action) {
    case "open-topic":
      state.topicId = el.dataset.id;
      state.screen = "topic";
      state.tab = "vocab";
      state.cardIndex = 0;
      state.flipped = false;
      state.practiceFreeQuestion = null;
      state.answer = ""; state.feedback = null; state.error = null;
      render();
      break;
    case "go-home":
      state.screen = "home";
      render();
      break;
    case "select-tab":
      state.tab = el.dataset.value;
      if (state.tab !== "practice") state.practiceFreeQuestion = null;
      render();
      break;
    case "flip-card":
      state.flipped = !state.flipped;
      render();
      break;
    case "prev-card": {
      const topic = getTopic(state.topicId);
      state.cardIndex = (state.cardIndex - 1 + topic.flashcards.length) % topic.flashcards.length;
      state.flipped = false;
      render();
      break;
    }
    case "next-card": {
      const topic = getTopic(state.topicId);
      state.cardIndex = (state.cardIndex + 1) % topic.flashcards.length;
      state.flipped = false;
      render();
      break;
    }
    case "speak-card": {
      const topic = getTopic(state.topicId);
      const card = topic.flashcards[state.cardIndex];
      speakWordThenExample(card.en, card.example);
      break;
    }
    case "toggle-known": {
      const prog = state.progress[state.topicId];
      const i = state.cardIndex;
      prog.known.has(i) ? prog.known.delete(i) : prog.known.add(i);
      render();
      break;
    }
    case "speak-question": {
      const topic = getTopic(state.topicId);
      speak(topic.questions[Number(el.dataset.idx)]);
      break;
    }
    case "speak-practice-question": {
      const topic = getTopic(state.topicId);
      const isFree = state.practiceFreeQuestion !== null;
      const q = isFree ? topic.questions[state.practiceFreeQuestion] : topic.questions[state.practiceQIdx];
      speak(q);
      break;
    }
    case "practice-question":
      state.practiceFreeQuestion = Number(el.dataset.idx);
      state.tab = "practice";
      state.answer = ""; state.feedback = null; state.error = null;
      render();
      break;
    case "select-practice-q":
      state.practiceQIdx = Number(el.dataset.value);
      state.answer = ""; state.feedback = null; state.error = null;
      render();
      break;
    case "toggle-mic":
      if (state.dictating) {
        stopDictation();
        state.dictating = false;
        render();
      } else {
        const ok = startDictation(
          text => { state.answer = state.answer ? state.answer + " " + text : text; render(); },
          () => { state.dictating = false; render(); }
        );
        if (!ok) { state.dictationHint = true; render(); }
        else { state.dictating = true; state.dictationHint = false; render(); }
      }
      break;
    case "submit-answer":
      submitAnswer();
      break;
    case "reset-practice":
      state.answer = ""; state.feedback = null; state.error = null;
      render();
      break;
    case "open-settings":
      state.settingsOpen = true;
      render();
      break;
    case "set-mode":
      state.settings.mode = el.dataset.mode;
      render();
      break;
    case "save-settings":
      saveSettings();
      state.settingsOpen = false;
      render();
      break;
  }
}

async function submitAnswer() {
  const topic = getTopic(state.topicId);
  const isFree = state.practiceFreeQuestion !== null;
  const question = isFree ? topic.questions[state.practiceFreeQuestion] : topic.questions[state.practiceQIdx];
  const qIdx = isFree ? state.practiceFreeQuestion : state.practiceQIdx;
  if (!state.answer.trim()) return;
  state.loading = true; state.error = null; state.feedback = null;
  render();
  try {
    const fb = await getCoachFeedback(question, state.answer, state.settings.apiKey);
    state.feedback = fb;
    state.progress[topic.id].practiced.add(qIdx);
  } catch (e) {
    state.error = "Coś nie zadziałało. Sprawdź internet i klucz API w ustawieniach, i spróbuj ponownie.";
  } finally {
    state.loading = false;
    render();
  }
}

render();

</script>
